syntax = "proto3";

package org_sfomuseum_embeddingsdb_service;
option go_package = "github.com/sfomuseum/go-embeddingsdb/grpc";

service EmbeddingsDBService {
    rpc AddRecord(AddRecordRequest) returns (AddRecordResponse) {}
    rpc GetRecord(GetRecordRequest) returns (GetRecordResponse) {}
    rpc QueryRecords(QueryRecordsRequest) returns (QueryRecordsResponse) {}
    rpc QueryRecordsById(QueryRecordsByIdRequest) returns (QueryRecordsResponse) {}
}

message EmbeddingsDBRecord {
    int64 depiction_id = 1;
    int64 subject_id = 2;
    string model = 3;
    int32 dimensions = 4;
    string content = 5;
    repeated float embeddings = 6;
    int64 created = 7;
}

message EmbeddingsDBQueryResult {
    int64 depiction_id = 1;
    int64 subject_id = 2;
    float similarity = 3;
}

message AddRecordRequest {
    EmbeddingsDBRecord record = 1;
}

message AddRecordResponse {}

message QueryRecordsRequest {
    EmbeddingsDBRecord record = 1;
}

message QueryRecordsByIdRequest {
    int64 depiction_id = 1;
    string model = 2;
}

message QueryRecordsResponse {
    repeated EmbeddingsDBQueryResult records = 1;
}

message GetRecordRequest {
    int64 depiction_id = 1;
    string model = 2;
}

message GetRecordResponse {
    EmbeddingsDBRecord record = 1;
}
